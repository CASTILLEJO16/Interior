<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Artículo - Sistema de Inventario</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .registro-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }
        
        .registro-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .registro-header h1 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
        }
        
        .registro-header h1 i {
            margin-right: 10px;
            color: #667eea;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }
        
        .user-info .btn-logout {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .user-info .btn-logout:hover {
            background: rgba(239, 68, 68, 1);
        }
        
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h2 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .form-header p {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-label {
            color: white;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-label .required {
            color: #ef4444;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        select.form-control option {
            background: #1a1a2e;
            color: white;
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        
        .file-upload {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .file-upload:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-upload-icon {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .file-upload-text {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .file-upload-text small {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .file-preview {
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .file-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            min-width: 300px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast.success {
            border-left: 4px solid #22c55e;
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast-icon {
            font-size: 1.2rem;
        }
        
        .toast.success .toast-icon {
            color: #22c55e;
        }
        
        .toast.error .toast-icon {
            color: #ef4444;
        }
        
        .toast-content {
            flex: 1;
        }
        
        .toast-message {
            color: #333;
            font-weight: 500;
        }
        
        .toast-close {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .registro-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="registro-container">
        <div class="registro-header">
            <h1><i class="fas fa-warehouse"></i> Sistema de Inventario</h1>
            <div class="user-info">
                <span id="userName">Usuario</span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
        
        <div class="form-container">
            <div class="form-header">
                <h2>Registrar Nuevo Artículo</h2>
                <p>Complete el formulario para registrar un artículo en el inventario</p>
            </div>
            
            <form id="inventoryForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">
                            Número de Inventario <span class="required">*</span>
                        </label>
                        <input type="text" id="numeroInventario" name="numero_inventario" class="form-control" required placeholder="Ej: INV-001">
                    </div>
                    
                                        
                    <div class="form-group">
                        <label class="form-label">
                            Fecha de Alta <span class="required">*</span>
                        </label>
                        <input type="date" id="fechaAlta" name="fecha_alta" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            Costo del Artículo <span class="required">*</span>
                        </label>
                        <input type="number" id="costo" name="costo" class="form-control" step="0.01" min="0" required placeholder="0.00">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            Nombre del Resguardante <span class="required">*</span>
                        </label>
                        <input type="text" id="resguardante" name="resguardante" class="form-control" required placeholder="Nombre completo">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            Imagen del Artículo
                        </label>
                        <div class="file-upload">
                            <input type="file" id="imagen" name="imagen" accept="image/*">
                            <div class="file-upload-icon">
                                <i class="fas fa-cloud-upload-alt"></i>
                            </div>
                            <div class="file-upload-text">
                                <p>Haga clic para subir o arrastre una imagen</p>
                                <small>JPG, PNG, GIF, WebP (Máx. 5MB)</small>
                            </div>
                        </div>
                        <div class="file-preview" id="imagePreview" style="display: none;">
                            <img id="previewImg" src="" alt="Vista previa">
                        </div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label class="form-label">
                            Descripción del Artículo <span class="required">*</span>
                        </label>
                        <textarea id="descripcion" name="descripcion" class="form-control" rows="4" required placeholder="Describa detalladamente el artículo, características, modelo, marca, etc."></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        Guardar Artículo
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fas fa-times"></i>
                        Limpiar
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script src="js/registro.js"></script>
</body>
</html>
